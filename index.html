<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ball Blitz</title>
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <div>
      <img height="135" src="./images/logo.png" alt="start-btn" srcset="" />
    </div>
    <div id="game-intro">
      <img
        height="180"
        id="startBtn"
        src="./images/start-btn.png"
        alt="start-btn"
        srcset=""
      />
      <div>
        <h3>Click to score. Avoid danger. Catch stars.</h3>
        <p>Stay alive for 60 seconds to win!</p>
        <p>You have 3 lives — make them count!</p>
      </div>
    </div>
    <div id="game-over" class="game-end">
      <br />
      <img src="./images/game-over.png" alt="game-over" />
    </div>
    <!-- Screen of the actual game -->
    <div id="stats">
      <br />
      <div>
        <!-- <h3>Stats</h3> -->
        <p>Score: <span id="score">0</span></p>
        <p>Lives: <span id="lives">3</span></p>
      </div>
      <!-- #game-screen is initially hidden using CSS style display: none -->
      <div id="game-container">
        <p>Time Left: <span id="timer">0</span>s</p>
        <div id="game-screen"></div>
      </div>
    </div>

    <!-- Screen once game is over  -->
    <div id="game-restart" class="game-end">
      <br />
      <button id="restartBtn">Restart Game</button>
    </div>
    <script src="./js/index.js"></script>
    <script src="./js/game.js"></script>
  </body>
</html>
